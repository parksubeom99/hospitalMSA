# clinicalService — 진료/처방 (8183)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinical-service
  labels:
    app.kubernetes.io/name: clinical-service
    app.kubernetes.io/part-of: hospitalmsa
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clinical-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clinical-service
        app.kubernetes.io/part-of: hospitalmsa
        app.kubernetes.io/component: app
    spec:
      enableServiceLinks: false
      containers:
        - name: clinical-service
          image: hospitalmsa/clinical-service:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8183
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          env:
            - name: ORACLE_USER
              value: his_clinical
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-secret
                  key: ORACLE_PASSWORD
            - name: IAM_BASE_URL
              value: http://iam-service:8181
            - name: ADMIN_BASE_URL
              value: http://admin-master-service:8182
            - name: SUPPORT_BASE_URL
              value: http://support-service:8184
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 15
            failureThreshold: 4
---
apiVersion: v1
kind: Service
metadata:
  name: clinical-service
  labels:
    app.kubernetes.io/name: clinical-service
    app.kubernetes.io/part-of: hospitalmsa
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clinical-service
  ports:
    - name: http
      port: 8183
      targetPort: http
