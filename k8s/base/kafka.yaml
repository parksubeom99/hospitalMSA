# Kafka — hospitalMSA infra layer (zookeeper 의존)
# StatefulSet + ClusterIP Service + PVC(data)
# ADVERTISED_LISTENERS: compose의 PLAINTEXT_HOST(호스트 디버깅용)는 제거,
# 클러스터 내부 통신용 PLAINTEXT://kafka:9092 단일 리스너로 단순화.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: hospitalmsa
    app.kubernetes.io/component: infra
data:
  KAFKA_BROKER_ID: "1"
  KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
  KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  TZ: Asia/Seoul
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: hospitalmsa
    app.kubernetes.io/component: infra
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/part-of: hospitalmsa
        app.kubernetes.io/component: infra
    spec:
      # Service명 'kafka'로 인해 K8s가 KAFKA_PORT 등 레거시 env를 주입하면
      # cp-kafka가 broker 설정으로 오인해 크래시 → 주입 비활성화 (DNS는 영향 없음)
      enableServiceLinks: false
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          envFrom:
            - configMapRef:
                name: kafka-config
          ports:
            - name: kafka
              containerPort: 9092
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          livenessProbe:
            exec:
              command:
                - kafka-broker-api-versions
                - --bootstrap-server
                - localhost:9092
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          readinessProbe:
            exec:
              command:
                - kafka-broker-api-versions
                - --bootstrap-server
                - localhost:9092
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: hospitalmsa
    app.kubernetes.io/component: infra
spec:
  type: ClusterIP
  # broker가 기동 중(Not Ready)에도 advertised 주소 kafka:9092로 자기 자신에
  # 접속할 수 있어야 controller가 startup을 완료할 수 있음 (닭-달걀 데드락 방지)
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
