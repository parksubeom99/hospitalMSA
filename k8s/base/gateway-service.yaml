# gatewayService — 외부 단일 진입점 (8180). 백엔드 4종 기동 후 배포.
# 외부 노출은 kubectl port-forward로 (로컬 검증용).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  labels:
    app.kubernetes.io/name: gateway-service
    app.kubernetes.io/part-of: hospitalmsa
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-service
        app.kubernetes.io/part-of: hospitalmsa
        app.kubernetes.io/component: app
    spec:
      enableServiceLinks: false
      containers:
        - name: gateway-service
          image: hospitalmsa/gateway-service:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8180
          envFrom:
            - secretRef:
                name: app-secret
          env:
            - name: TZ
              value: Asia/Seoul
            - name: IAM_SERVICE_URL
              value: http://iam-service:8181
            - name: ADMIN_SERVICE_URL
              value: http://admin-master-service:8182
            - name: CLINICAL_SERVICE_URL
              value: http://clinical-service:8183
            - name: SUPPORT_SERVICE_URL
              value: http://support-service:8184
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 15
            failureThreshold: 4
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  labels:
    app.kubernetes.io/name: gateway-service
    app.kubernetes.io/part-of: hospitalmsa
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gateway-service
  ports:
    - name: http
      port: 8180
      targetPort: http
