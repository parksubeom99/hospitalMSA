# =============================================================================
# Grafana Datasource 자동 프로비저닝 — Phase 2-E
# Grafana 기동 시 Tempo datasource 자동 등록
# =============================================================================

apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: true
    jsonData:
      nodeGraph:
        enabled: true
      search:
        hide: false
      tracesToLogsV2:
        datasourceUid: ""
      serviceMap:
        datasourceUid: ""
      lokiSearch:
        datasourceUid: ""
