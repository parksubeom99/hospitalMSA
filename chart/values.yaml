# hospitalMSA Helm 차트 기본값 (local 환경 기준)
# 환경별 오버라이드: helm install ... -f values-prod.yaml 또는 --set

global:
  # 로컬 빌드 이미지를 노드에 미리 로드한 상태 기준 (Phase 1~3 방식)
  imagePullPolicy: Never
  # "" = 클러스터 기본 StorageClass 사용 (Docker Desktop: standard)
  storageClassName: ""

# 백엔드 5종 공유 환경변수 → app-config ConfigMap
appConfig:
  SPRING_PROFILES_ACTIVE: oracle
  ORACLE_HOST: oracle
  ORACLE_PORT: "1521"
  ORACLE_SID: XEPDB1
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  TZ: Asia/Seoul

# Secret 이름 (차트에 포함하지 않음 — 사전에 kubectl create secret)
secrets:
  oracle: oracle-secret
  app: app-secret

# ── 인프라 계층 ──────────────────────────────────────────────
oracle:
  image:
    repository: container-registry.oracle.com/database/express
    tag: 21.3.0-xe
  persistence:
    size: 10Gi

redis:
  image:
    repository: redis
    tag: 7-alpine
  persistence:
    size: 1Gi

zookeeper:
  image:
    repository: confluentinc/cp-zookeeper
    tag: "7.6.0"
  persistence:
    size: 2Gi

kafka:
  image:
    repository: confluentinc/cp-kafka
    tag: "7.6.0"
  persistence:
    size: 5Gi

# ── 백엔드 계층 ──────────────────────────────────────────────
iamService:
  image:
    repository: hospitalmsa/iam-service
    tag: local
  replicaCount: 1
  oracleUser: his_iam
  resources: {}

adminMasterService:
  image:
    repository: hospitalmsa/admin-master-service
    tag: local
  replicaCount: 1
  oracleUser: his_admin
  resources: {}

clinicalService:
  image:
    repository: hospitalmsa/clinical-service
    tag: local
  replicaCount: 1
  oracleUser: his_clinical
  resources: {}

supportService:
  image:
    repository: hospitalmsa/support-service
    tag: local
  replicaCount: 1
  oracleUser: his_support
  resources: {}

gatewayService:
  image:
    repository: hospitalmsa/gateway-service
    tag: local
  replicaCount: 1
  resources: {}

# ── 프론트엔드 ───────────────────────────────────────────────
frontend:
  image:
    repository: hospitalmsa/frontend
    tag: local
  replicaCount: 1
  resources: {}
