# ============================================================
# psbMSA Hospital MSA — Docker Compose (AWS 배포용)
# MySQL 컨테이너 제거 → RDS 연결
# Grafana/Tempo 제거 → 로컬 시연 (t3.small 메모리 한계)
# ============================================================
# 외부 노출 포트:
#   8180 → gatewayService  (백엔드 단일 진입점)
#   3000 → csFrontend      (Next.js 프론트)
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # INFRA: Redis
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: psb-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - psb-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────
  # INFRA: Zookeeper
  # ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: psb-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "*"
      TZ: Asia/Seoul
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - psb-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -q 'Zookeeper version'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # INFRA: Kafka
  # ──────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: psb-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
      TZ: Asia/Seoul
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - psb-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # BACKEND: iamService (8181 — 내부 전용)
  # ──────────────────────────────────────────────────────────
  iam-service:
    build:
      context: ./csBackend/iamService
      dockerfile: Dockerfile
    container_name: psb-iam
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: 3306
      MYSQL_DB: hospitalmsa_iam
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      HIS_JWT_SECRET: ${HIS_JWT_SECRET}
      JAVA_OPTS: "-Xmx256m -Xms128m"
      TZ: Asia/Seoul
    networks:
      - psb-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8181"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ──────────────────────────────────────────────────────────
  # BACKEND: adminMasterService (8182 — 내부 전용)
  # ──────────────────────────────────────────────────────────
  admin-master-service:
    build:
      context: ./csBackend/adminMasterService
      dockerfile: Dockerfile
    container_name: psb-admin
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: 3306
      MYSQL_DB: hospitalmsa_admin
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      HIS_JWT_SECRET: ${HIS_JWT_SECRET}
      IAM_BASE_URL: http://iam-service:8181
      CLINICAL_BASE_URL: http://clinical-service:8183
      SUPPORT_BASE_URL: http://support-service:8184
      JAVA_OPTS: "-Xmx256m -Xms128m"
      TZ: Asia/Seoul
    networks:
      - psb-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8182"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ──────────────────────────────────────────────────────────
  # BACKEND: clinicalService (8183 — 내부 전용)
  # ──────────────────────────────────────────────────────────
  clinical-service:
    build:
      context: ./csBackend/clinicalService
      dockerfile: Dockerfile
    container_name: psb-clinical
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: 3306
      MYSQL_DB: hospitalmsa_clinical
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      HIS_JWT_SECRET: ${HIS_JWT_SECRET}
      IAM_BASE_URL: http://iam-service:8181
      ADMIN_BASE_URL: http://admin-master-service:8182
      SUPPORT_BASE_URL: http://support-service:8184
      JAVA_OPTS: "-Xmx256m -Xms128m"
      TZ: Asia/Seoul
    networks:
      - psb-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8183"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ──────────────────────────────────────────────────────────
  # BACKEND: supportService (8184 — 내부 전용)
  # ──────────────────────────────────────────────────────────
  support-service:
    build:
      context: ./csBackend/supportService
      dockerfile: Dockerfile
    container_name: psb-support
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      iam-service:
        condition: service_healthy
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: 3306
      MYSQL_DB: hospitalmsa_support
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      HIS_JWT_SECRET: ${HIS_JWT_SECRET}
      IAM_BASE_URL: http://iam-service:8181
      ORDER_BASE_URL: http://clinical-service:8183
      JAVA_OPTS: "-Xmx256m -Xms128m"
      TZ: Asia/Seoul
    networks:
      - psb-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8184"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ──────────────────────────────────────────────────────────
  # BACKEND: gatewayService (8180 — 외부 노출)
  # ──────────────────────────────────────────────────────────
  gateway-service:
    build:
      context: ./csBackend/gatewayService
      dockerfile: Dockerfile
    container_name: psb-gateway
    restart: unless-stopped
    depends_on:
      iam-service:
        condition: service_healthy
      admin-master-service:
        condition: service_healthy
      clinical-service:
        condition: service_healthy
      support-service:
        condition: service_healthy
    environment:
      IAM_SERVICE_URL: http://iam-service:8181
      ADMIN_SERVICE_URL: http://admin-master-service:8182
      CLINICAL_SERVICE_URL: http://clinical-service:8183
      SUPPORT_SERVICE_URL: http://support-service:8184
      GATEWAY_ALLOWED_ORIGIN: ${GATEWAY_ALLOWED_ORIGIN}
      HIS_JWT_SECRET: ${HIS_JWT_SECRET}
      TZ: Asia/Seoul
    ports:
      - "8180:8180"
    networks:
      - psb-net

  # ──────────────────────────────────────────────────────────
  # FRONTEND: csFrontend (3000 — 외부 노출)
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./csFrontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL}
    container_name: psb-frontend
    restart: unless-stopped
    depends_on:
      - gateway-service
    ports:
      - "3000:3000"
    networks:
      - psb-net

# ──────────────────────────────────────────────────────────
# NETWORKS
# ──────────────────────────────────────────────────────────
networks:
  psb-net:
    driver: bridge

# ──────────────────────────────────────────────────────────
# VOLUMES
# ──────────────────────────────────────────────────────────
volumes:
  redis-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
