name: CI — JUnit5 Unit Tests

on:
  push:
    branches: [ feature/phase2-oracle, master ]
  pull_request:
    branches: [ feature/phase2-oracle, master ]

jobs:
  test-admin-master:
    name: AdminMasterService 단위 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-admin-${{ hashFiles('csBackend/adminMasterService/**/*.gradle*') }}
          restore-keys: gradle-admin-

      - name: gradlew 실행 권한 부여
        working-directory: csBackend/adminMasterService
        run: chmod +x gradlew

      - name: 전체 단위 테스트 실행
        working-directory: csBackend/adminMasterService
        run: ./gradlew test --no-daemon

      - name: 테스트 결과 리포트
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: admin-test-report
          path: csBackend/adminMasterService/build/reports/tests/test/

  test-clinical:
    name: ClinicalService 단위 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-clinical-${{ hashFiles('csBackend/clinicalService/**/*.gradle*') }}
          restore-keys: gradle-clinical-

      - name: gradlew 실행 권한 부여
        working-directory: csBackend/clinicalService
        run: chmod +x gradlew

      - name: 전체 단위 테스트 실행
        working-directory: csBackend/clinicalService
        run: ./gradlew test --no-daemon

      - name: 테스트 결과 리포트
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clinical-test-report
          path: csBackend/clinicalService/build/reports/tests/test/
