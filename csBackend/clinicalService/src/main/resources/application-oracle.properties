# =============================================================================
# clinicalService — Oracle 프로파일
# =============================================================================

spring.datasource.url=jdbc:oracle:thin:@${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}/${ORACLE_SID:XEPDB1}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=${ORACLE_USER:his_clinical}
spring.datasource.password=${ORACLE_PASSWORD:his_password}

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# [ADDED] 체크섬 불일치 시 repair 를 먼저 수행 → DROP/재실행 없이 동기화
spring.flyway.repair-on-migrate=true
# [ADDED] validate 실패해도 기동 계속 → validate 실패로 인한 기동 불가 방지
spring.flyway.validate-on-migrate=false

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# [ADDED] Phase 2-E: Distributed Tracing — Grafana Tempo
# opentelemetry-exporter-otlp 는 HTTP exporter → 4318 HTTP 포트 사용
spring.application.name=clinical-service
management.observations.http.server.requests.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://tempo:4318/v1/traces
