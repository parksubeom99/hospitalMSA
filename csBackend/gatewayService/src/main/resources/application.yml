server:
  port: 8180

spring:
  application:
    name: gateway-service
  # [ADDED 2026-04-24, post-pres-2] Reactor Context Propagation
  #   - Spring Cloud Gateway가 downstream(admin/clinical) 호출 시 traceparent 헤더 전파
  #   - "auto" = micrometer-context-propagation 클래스패스 감지 시 자동 활성화
  reactor:
    context-propagation: auto
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        # [FIXED 2026-04-16] add-to-simple-url-handler-mapping 추가
        # 원인: Gateway는 Spring WebFlux 기반이고 SimpleUrlHandlerMapping이 OPTIONS 요청을
        #       먼저 처리하는데, 이 플래그 없이는 globalcors 설정이 그 매핑에 적용되지 않음
        # 해결: true 설정 -> OPTIONS preflight가 CORS 필터를 정상 통과
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            # [FIXED 2026-04-16] allowedOrigins -> allowedOriginPatterns 변경
            # 원인: allowCredentials: true + allowedOrigins: 와일드카드 조합은 Spring에서 금지됨
            # 해결: allowedOriginPatterns 사용 -> 와일드카드 허용 + Credentials 공존 가능
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: iam-service
          uri: ${IAM_SERVICE_URL:http://localhost:8181}
          predicates:
            - Path=/api/auth/**,/api/audit/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: admin-master-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8182}
          predicates:
            - Path=/api/admin/**,/api/master/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: clinical-service
          uri: ${CLINICAL_SERVICE_URL:http://localhost:8183}
          predicates:
            - Path=/api/emr/**,/api/orders/**,/api/final-orders/**,/api/encounters/**,/api/results/**,/api/clinical/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: support-service
          uri: ${SUPPORT_SERVICE_URL:http://localhost:8184}
          predicates:
            - Path=/api/worklist/**,/api/lab-results/**,/api/radiology-reports/**,/api/procedure-reports/**,/api/injections/**,/api/med-execs/**,/api/endoscopy-reports/**,/api/support/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  # [ADDED 2026-04-24, post-pres-2] OpenTelemetry 분산추적
  #   - admin/clinical과 동일 패턴 (OTLP HTTP exporter → Tempo 4318)
  #   - 100% 샘플링 (개발/시연 환경 — 운영 시 0.1 등으로 낮춰야 함)
  observations:
    http:
      server:
        requests:
          enabled: true   # WebFlux server observation 명시 활성화 (admin과 동일)
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces

his:
  jwt:
    secret: ${HIS_JWT_SECRET:CHANGE_ME_LOCAL_SECRET_CHANGE_ME_LOCAL_SECRET}
