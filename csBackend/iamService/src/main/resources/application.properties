# src/main/resources/application.properties
server.port=8181
spring.application.name=iam-service

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# [MODIFIED] ???? ?? + allowPublicKeyRetrieval=true + DB? hospitalmsa_iam ??
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:hospitalmsa_iam}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:1111}


# Flyway (IAM schema/seed/index baseline)
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=0


# Logging
logging.level.kr.co.seoulit.hospital=DEBUG


his.jwt.secret=${HIS_JWT_SECRET:CHANGE_ME_LOCAL_SECRET_CHANGE_ME_LOCAL_SECRET}

# Audit retention (archive)
audit.retention-days=${AUDIT_RETENTION_DAYS:180}

# Redis (JWT Refresh Token store)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3s

# JWT TTLs (seconds)
his.jwt.access-ttl-seconds=${HIS_JWT_ACCESS_TTL_SECONDS:28800}
his.jwt.refresh-ttl-seconds=${HIS_JWT_REFRESH_TTL_SECONDS:1209600}
his.jwt.refresh.prefix=${HIS_JWT_REFRESH_PREFIX:iam:refresh:}

# actuator health ????? ??
# [MODIFIED] show-details=never: ??? {"status":"UP"} ?? ??? ?? ? Docker healthcheck grep ???
# [MODIFIED] management.security.enabled ??: Spring Boot 3.x?? ???? ??? ??
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never